  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1c1008"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes flicker {
        0%,19%,21%,23%,25%,54%,56%,100% {
          fill: #f5d08a;
          filter: url(#glow) drop-shadow(0 0 6px #c8960c) drop-shadow(0 0 16px #8b6200);
        }
        20%,24%,55% {
          fill: #b89030;
          filter: none;
        }
      }
      @keyframes pulse {
        0%,100% { opacity:1; filter: url(#glow) drop-shadow(0 0 8px #f5d08a) drop-shadow(0 0 20px #c8960c) drop-shadow(0 0 35px #8b6200); }
        50%  { opacity:0.88; filter: url(#glow) drop-shadow(0 0 18px #f5d08a) drop-shadow(0 0 40px #c8960c) drop-shadow(0 0 65px #8b6200); }
      }
      .px {
        fill: #f5d08a;
        animation: pulse 2.8s ease-in-out infinite;
      }
    </style>
  </defs>
